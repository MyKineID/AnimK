name: Build Debug APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee build-log.txt

      - name: List APK output
        run: |
          echo "=== APK files ==="
          find app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "No APK found in app/build/outputs"
          echo "=== Full build output ==="
          find app/build/outputs -type f 2>/dev/null || echo "No outputs directory"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AnimK-APK
          path: |
            app/build/outputs/apk/**/*.apk
            build-log.txt
          retention-days: 7
          if-no-files-found: warn
