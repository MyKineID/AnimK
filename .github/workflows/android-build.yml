name: Build Signed Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Build Signed Release APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-log.txt

      - name: Report build error
        if: failure()
        shell: bash
        run: |
          message=$(tail -n 30 build-log.txt | tr '\n' ' ' | sed 's/%/%25/g; s/::/%3A%3A/g')
          echo "::error title=Gradle build failed::$message"

      # ─── Kirim Error Log ke Telegram (jika gagal) ────────────
      - name: Send Error Log to Telegram
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          LOG="build-log.txt"
          ERROR_HEAD="$(head -5 "$LOG" 2>/dev/null || echo 'No log')"
          ERROR_TAIL="$(tail -n 20 "$LOG" 2>/dev/null || echo 'No log')"
          ERROR_SUMMARY=$(echo "$ERROR_HEAD" | grep -oP 'FAILURE:.*' || echo "$ERROR_TAIL" | head -3)
          CAPTION="❌ *AnimK Build Failed!*"
          CAPTION+=$'\n'
          CAPTION+="📦 Commit: $(git rev-parse --short HEAD 2>/dev/null || echo '?')"
          CAPTION+=$'\n'
          CAPTION+="🌿 Branch: ${GITHUB_REF_NAME}"
          CAPTION+=$'\n'
          CAPTION+="📝 $(git log -1 --pretty=format:%s 2>/dev/null || echo '?')"
          CAPTION+=$'\n\n'
          CAPTION+="🔴 *Error:* ${ERROR_SUMMARY:-Unknown error}"
          CAPTION+=$'\n'
          CAPTION+="📎 File log terlampir untuk detail lengkap."
          curl -s -F "chat_id=${CHAT_ID}" \
               -F "document=@${LOG}" \
               -F "caption=${CAPTION}" \
               "https://api.telegram.org/bot${TOKEN}/sendDocument"

      - uses: actions/upload-artifact@v4
        with:
          name: AnimK-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AnimK-build-log
          path: build-log.txt
          retention-days: 7
          if-no-files-found: ignore

      # ─── Kirim APK ke Telegram ────────────────────────────────
      - name: Send APK to Telegram
        if: success()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "APK not found at $APK"
            exit 1
          fi
          CAPTION="✅ AnimK Build Succeed!"
          CAPTION+=$'\n'
          CAPTION+="📦 Version: $(git rev-parse --short HEAD)"
          CAPTION+=$'\n'
          CAPTION+="📝 $(git log -1 --pretty=format:%s)"
          CAPTION+=$'\n'
          CAPTION+="🌿 Branch: ${GITHUB_REF_NAME}"
          CAPTION+=$'\n'
          CAPTION+="💼 Size: $(du -h "$APK" | cut -f1)"
          curl -s -F "chat_id=${CHAT_ID}" \
               -F "document=@${APK}" \
               -F "caption=${CAPTION}" \
               "https://api.telegram.org/bot${TOKEN}/sendDocument"
