name: Build Debug APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-log.txt

      - name: Report build error
        if: failure()
        shell: bash
        run: |
          message=$(tail -n 30 build-log.txt | tr '\n' ' ' | sed 's/%/%25/g; s/::/%3A%3A/g')
          echo "::error title=Gradle build failed::$message"

      - uses: actions/upload-artifact@v4
        with:
          name: AnimK-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AnimK-build-log
          path: build-log.txt
          retention-days: 7
          if-no-files-found: ignore
