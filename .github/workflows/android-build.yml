name: Build Signed Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Build Signed Release APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-log.txt

      - name: Report build error
        if: failure()
        shell: bash
        run: |
          message=$(tail -n 30 build-log.txt | tr '\n' ' ' | sed 's/%/%25/g; s/::/%3A%3A/g')
          echo "::error title=Gradle build failed::$message"

      - uses: actions/upload-artifact@v4
        with:
          name: AnimK-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AnimK-build-log
          path: build-log.txt
          retention-days: 7
          if-no-files-found: ignore

      # ─── Kirim APK ke Telegram ────────────────────────────────
      - name: Send APK to Telegram
        if: success()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "APK not found at $APK"
            exit 1
          fi
          COMMIT_MSG="$(git log -1 --pretty=format:%s)"
          curl -F "chat_id=${CHAT_ID}" \
               -F "document=@${APK}" \
               -F "caption=✅ *AnimK Build Succeed!*%0A%0A📦 Version: $(git rev-parse --short HEAD)%0A📝 Commit: ${COMMIT_MSG}%0A🌿 Branch: ${GITHUB_REF_NAME}%0A💼 Size: $(du -h ${APK} | cut -f1)" \
               "https://api.telegram.org/bot${TOKEN}/sendDocument
